apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - todo.local
    secretName: todo-tls-secret
  rules:
  - host: todo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 4000
---
apiVersion: v1
kind: Secret
metadata:
  name: todo-tls-secret
type: kubernetes.io/tls
data:
  # Note: In production, these should be generated from a valid cert.
  # For local/testing, use: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt -subj "/CN=todo.local"
  # and then: kubectl create secret tls todo-tls-secret --key tls.key --cert tls.crt
  tls.crt: "" 
  tls.key: ""
