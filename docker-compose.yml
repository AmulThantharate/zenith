version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: zenith_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: todo_app
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zenith_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: zenith_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: dev
      DB_PASSWORD: dev_password
      DB_NAME: todo_app
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: zenith_access_secret_123
      JWT_REFRESH_SECRET: zenith_refresh_secret_456
      SESSION_SECRET: zenith_session_secret_789
      CLIENT_URL: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

  # Frontend Web App
  frontend:
    build: ./frontend
    container_name: zenith_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
